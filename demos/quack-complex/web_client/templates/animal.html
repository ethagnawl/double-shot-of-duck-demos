<html>
  <head>
    <title>Items</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" media="all">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap3@3.3.5/dist/css/bootstrap.min.css" media="all">
  </head>
  <body>
    <div class="container">
      <div class="jumbotron">
        <div class="container">
          <h1>Backyard Cam</h1>
          <h2>Database: {{type}}</h2>
        </div>
      </div>
      <div class="row">
        {% for item in animals %}
        <div class="col-md-4">
          <h3>Captured on {{item[1]}} at: {{item[0]}}</h3>
          <a href="#" class="thumbnail">
            <img src="{{item[2]}}" alt="" />
          </a>
          </section>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
